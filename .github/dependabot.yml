version: 2
updates:
  - package-ecosystem: gomod
    directory: /quickstart/service
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # quickstart/service is go 1.24; grpc 1.81+ requires go 1.25.
      - dependency-name: "google.golang.org/grpc"
        versions: [">=1.81.0"]

  - package-ecosystem: docker
    directory: /quickstart/service
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
