name: Bug Report
description: Report a bug in an OpenDecree demo
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: demo
    attributes:
      label: Demo
      options:
        - Quickstart
        - "No SDK (curl only)"
        - "Pick Your Language"
        - Multi-Tenant
        - Schema Evolution
        - Config as Code
        - Other
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: OpenDecree server version
      placeholder: e.g., v0.5.0
    validations:
      required: true
  - type: input
    id: docker-version
    attributes:
      label: Docker version
      placeholder: e.g., Docker 27.0, Compose v2.29
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g., Linux, macOS, Windows
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
