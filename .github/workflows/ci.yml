# CI pipeline for OpenDecree demos.
#
# Jobs: one per demo (docker compose up + test.sh) → check (alls-green gate)
# Each demo runs on its own runner since they share fixed ports.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  quickstart:
    name: Quickstart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run test.sh
        working-directory: quickstart
        run: bash test.sh

  rest-walkthrough:
    name: REST walkthrough
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run test.sh
        working-directory: rest-walkthrough
        run: bash test.sh

  multi-tenant:
    name: Multi-tenant
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run test.sh
        working-directory: multi-tenant
        run: bash test.sh

  check:
    name: CI check
    if: always()
    needs: [quickstart, rest-walkthrough, multi-tenant]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
