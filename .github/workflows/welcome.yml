name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Thanks for opening your first issue! We'll take a look soon.

            In the meantime:
            - Check [CONTRIBUTING.md](https://github.com/opendecree/demos/blob/main/CONTRIBUTING.md) for how to add or fix a demo
            - Search [Discussions](https://github.com/opendecree/decree/discussions) for related topics
          pr_message: |
            Thanks for your first pull request! We appreciate the contribution.

            Before review, please make sure:
            - `docker compose up` works from a clean state
            - The demo has a README with a clear walkthrough
            - See [CONTRIBUTING.md](https://github.com/opendecree/demos/blob/main/CONTRIBUTING.md) for the full checklist
