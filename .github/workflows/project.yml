name: Project automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: read
  pull-requests: read

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/opendecree/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
