# Multi-Tenant Demo — Docker Compose
#
# Architecture:
#   postgres + redis → decree-server → seed-schema
#                                    → seed-tenant1
#                                    → seed-tenant2
#                                    → admin (UI)
#
# Ports:
#   3000 — Admin panel (decree-ui) for viewing/editing config
#   8080 — Decree REST API (exposed for CLI walkthrough)
#
# Data flow:
#   1. schema.seed.yaml defines the schema — deployed once, shared by all tenants
#   2. tenant1.config.seed.yaml and tenant2.config.seed.yaml define per-tenant config
#   3. Admin panel lets you view and edit any tenant's config via the UI

services:
  # --- Infrastructure ---
  # PostgreSQL stores schemas, config values, and audit history.
  # The schema, RLS policies, and decree_app role are created by the `migrate`
  # service below — not by an initdb script.
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: centralconfig
      POSTGRES_USER: centralconfig
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralconfig"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Redis handles cache invalidation and real-time change notifications (pub/sub).
  redis:
    image: redis:7
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # --- Database migrations ---
  # Creates the tables, RLS policies, and the unprivileged decree_app role that
  # the 0.12 server assumes (SET ROLE) on every connection. A fresh database must
  # be migrated before the server starts, so decree-server waits for this to
  # finish. Uses the decree CLI image, which bundles the migrations.
  migrate:
    image: ghcr.io/opendecree/decree-cli:0.12.0-alpha.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_WRITE_URL: "postgres://centralconfig:localdev@postgres:5432/centralconfig?sslmode=disable"
    command: ["migrate", "up"]

  # --- Decree Server ---
  # The core config management service.
  # Exposes gRPC (:9090) for SDKs and CLI, and REST (:8080) for the admin UI / curl.
  decree-server:
    image: ghcr.io/opendecree/decree:0.12.0-alpha.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GRPC_PORT: "9090"
      HTTP_PORT: "8080"
      INSECURE_LISTEN: "1"             # Plaintext gRPC/HTTP — local demo only
      # Accept x-subject / x-role / x-tenant-id from the demo's admin UI and curl
      # calls. The 0.12 HTTP gateway rejects these identity headers from clients
      # by default (impersonation guard); demos run behind a trusted local proxy.
      DECREE_GATEWAY_TRUSTED_PROXY: "1"
      DB_WRITE_URL: "postgres://centralconfig:localdev@postgres:5432/centralconfig?sslmode=disable"
      DB_READ_URL: "postgres://centralconfig:localdev@postgres:5432/centralconfig?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      ENABLE_SERVICES: "schema,config,audit"
    ports:
      - "8080:8080"   # Exposed so the run.sh CLI walkthrough can reach it from the host

  # --- Step 1: App deploys the schema ---
  # Schema-only seed. Runs once on startup; idempotent on re-run.
  seed-schema:
    image: ghcr.io/opendecree/decree-cli:0.12.0-alpha.4
    depends_on:
      decree-server:
        condition: service_started
    volumes:
      - ./schema.seed.yaml:/schema.seed.yaml:ro
    command: ["seed", "/schema.seed.yaml",
      "--server", "decree-server:9090", "--subject", "demo-setup",
      "--auto-publish", "--insecure", "--wait", "--wait-timeout", "60s"]

  # --- Step 2: Tenant 1 (US store) provisions its config ---
  seed-tenant1:
    image: ghcr.io/opendecree/decree-cli:0.12.0-alpha.4
    depends_on:
      seed-schema:
        condition: service_completed_successfully
    volumes:
      - ./tenant1.config.seed.yaml:/tenant1.config.seed.yaml:ro
    command: ["seed", "/tenant1.config.seed.yaml",
      "--server", "decree-server:9090", "--subject", "demo-setup",
      "--insecure", "--wait", "--wait-timeout", "60s"]

  # --- Step 3: Tenant 2 (EU store) onboards ---
  # Same schema, independent config.
  seed-tenant2:
    image: ghcr.io/opendecree/decree-cli:0.12.0-alpha.4
    depends_on:
      seed-schema:
        condition: service_completed_successfully
    volumes:
      - ./tenant2.config.seed.yaml:/tenant2.config.seed.yaml:ro
    command: ["seed", "/tenant2.config.seed.yaml",
      "--server", "decree-server:9090", "--subject", "demo-setup",
      "--insecure", "--wait", "--wait-timeout", "60s"]

  # --- Admin GUI ---
  # The decree-ui admin panel. Runs in full mode with the superadmin role: the
  # role-first rail shows the system overview, the tenant list, and schemas, so
  # you can switch between tenant1 and tenant2 and see their independent config.
  admin:
    image: ghcr.io/opendecree/decree-ui:0.2.0-alpha.2
    depends_on:
      decree-server:
        condition: service_started
    environment:
      API_URL: http://decree-server:8080
      LAYOUT_MODE: full                  # Role-first rail: overview, tenants, schemas
      DEFAULT_ROLE: superadmin           # superadmin sees all tenants
      DEFAULT_SUBJECT: admin
    ports:
      - "3000:80"

volumes:
  pgdata:
